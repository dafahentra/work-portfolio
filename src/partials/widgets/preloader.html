<!-- Awwwards-Grade Progress Preloader -->
<div class="preloader" id="preloader" aria-label="Loading" role="status">

    <!-- Corner label -->
    <span class="pl-corner-label">Loading</span>

    <!-- Center block -->
    <div class="pl-block" id="pl-block">

        <!-- Eyebrow -->
        <p class="pl-eyebrow">Portfolio</p>

        <!-- Name — clipped for slide-up reveal -->
        <div class="pl-name-clip">
            <h1 class="pl-name">Dafa Hentra</h1>
        </div>

        <!-- Progress track — same width as block / name -->
        <div class="pl-track-wrap">
            <div class="pl-track-bg"></div>
            <div class="pl-track-fill" id="pl-bar"></div>
        </div>

        <!-- Footer row: tagline left, counter right -->
        <div class="pl-foot">
            <span class="pl-tagline">Finance &amp; Technology</span>
            <div class="pl-counter">
                <span id="pl-percent">00</span><span class="pl-pct-sign">%</span>
            </div>
        </div>

    </div>

</div>
